services:
  cluster-master:
    image: firasj/spark-docker-cluster
    platform: linux/amd64
    container_name: cluster-master
    ports:
      - "8088:8088"
      - "4040:4040"
      - "19888:19888"
      - "9000:9000"
      - "9870:9870"
    volumes:
      - "./app:/app"
      - "./a.parquet:/datasets/a.parquet:ro"
    networks:
      - spark-cluster
    depends_on:
      - cluster-slave-1
      - cassandra-server
    hostname: cluster-master
    tty: true
    working_dir: /app
    entrypoint:
      - bash
      - /app/app.sh

  cluster-slave-1:
    image: firasj/spark-docker-cluster
    platform: linux/amd64
    container_name: cluster-slave-1
    volumes:
      - "./app:/app"
    networks:
      - spark-cluster
    hostname: cluster-slave-1
    tty: true
    working_dir: /app
    entrypoint:
      - bash
      - -c
      - |
        service ssh start
        hdfs --daemon start datanode
        yarn --daemon start nodemanager
        tail -f /dev/null

  cassandra-server:
    image: cassandra
    container_name: cassandra-server
    ports:
      - "9042:9042"
    networks:
      - spark-cluster

networks:
  spark-cluster:
    driver: bridge